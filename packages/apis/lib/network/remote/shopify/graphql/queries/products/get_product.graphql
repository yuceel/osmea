query GetProduct($id: ID!) {
  product(id: $id) {
    id
    title
    description
    handle
    status
    vendor
    productType
    tags
    createdAt
    updatedAt
    variants(first: 50) {
      edges {
        node {
          id
          title
          price
          sku
          inventoryQuantity
          weight
          weightUnit
        }
      }
    }
    images(first: 20) {
      edges {
        node {
          id
          url
          altText
          width
          height
        }
      }
    }
  }
}
