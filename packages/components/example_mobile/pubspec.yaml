name: osmea_components_example
description: Example app for OSMEA UI Kit.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  osmea_components:
    path: ../
  intl: ^0.20.2
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.1
  http: ^1.1.0
  core:
    path: ../../core
  go_router: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/

