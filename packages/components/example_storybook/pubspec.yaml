name: osmea_storybook_example
description: Storybook example for OSMEA UI Kit components.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  osmea_components:
    path: ../
  intl: ^0.19.0
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.1
  storybook_flutter: ^0.14.1
  device_frame: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
