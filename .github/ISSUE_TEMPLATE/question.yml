name: ❓ Question/Help
description: Ask questions about using OSMEA or get help with implementation
title: "[QUESTION] "
labels: ["question", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        Need help with OSMEA? Ask your questions here! 
        We're here to help you succeed with your e-commerce app development.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm you've tried the following
      options:
        - label: I have read the [documentation](https://github.com/masterfabric-mobile/osmea/blob/dev/README.md)
          required: true
        - label: I have searched existing issues and discussions
          required: true
        - label: I have checked the example projects
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Question Category
      description: What area does your question relate to?
      options:
        - Getting started
        - Project setup
        - Core architecture
        - API integration
        - UI components
        - CLI usage
        - Deployment
        - Best practices
        - Performance
        - Testing
        - Other
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Related Package
      description: Which OSMEA package is your question about?
      options:
        - Core
        - APIs
        - Components
        - CLI Tool
        - General/All
        - Not sure
    validations:
      required: false

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: |
        Please be as specific as possible. Include:
        - What you're trying to achieve
        - What you've tried so far
        - Where you're stuck
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide context about your project and use case
      placeholder: |
        - Project type: [e.g., new e-commerce app, existing app integration]
        - Target platforms: [iOS, Android, Web]
        - E-commerce platform: [Shopify, WooCommerce, etc.]
        - Experience level: [beginner, intermediate, advanced]
    validations:
      required: true

  - type: textarea
    id: code_example
    attributes:
      label: Relevant Code
      description: If applicable, share relevant code snippets
      render: dart
      placeholder: |
        // Include relevant code here
        // Remove any sensitive information
    validations:
      required: false

  - type: textarea
    id: what_tried
    attributes:
      label: What You've Tried
      description: What have you already attempted?
      placeholder: |
        1. I tried...
        2. I looked at...
        3. I followed the guide for...
    validations:
      required: false

  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected Outcome
      description: What are you hoping to achieve?
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your development environment details
      placeholder: |
        - OSMEA Version: [e.g. 1.0.0]
        - Flutter Version: [e.g. 3.6.1]
        - OS: [e.g. macOS 14.0, Windows 11]
        - IDE: [e.g. VS Code, Android Studio]
    validations:
      required: false

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How urgent is this question for you?
      options:
        - Low - Just curious
        - Medium - Would like to know soon
        - High - Blocking my development
        - Critical - Production issue
    validations:
      required: false
