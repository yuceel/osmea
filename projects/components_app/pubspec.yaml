name: components_app
description: OSMEA Components App - A comprehensive Flutter showcase for OSMEA UI components

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  # ────────────────────────────────
  # FLUTTER & DART PACKAGES
  # ────────────────────────────────
  flutter:
    sdk: flutter
  
  # ────────────────────────────────
  # EXTERNAL DEPENDENCIES
  # ────────────────────────────────
  intl: ^0.20.2                    # Internationalization support
  flutter_colorpicker: ^1.1.0      # Color picker widget
  url_launcher: ^6.3.1             # URL handling and launching
  http: ^1.1.0                     # HTTP client for API calls
  go_router: ^15.1.3               # Declarative routing solution
  
  # ────────────────────────────────
  # LOCAL OSMEA PACKAGES
  # ────────────────────────────────
  core:
    path: ../../packages/core       # Shared business logic, constants, utilities

dev_dependencies:
  # ────────────────────────────────
  # FLUTTER DEVELOPMENT TOOLS
  # ────────────────────────────────
  flutter_test:
    sdk: flutter                    # Flutter testing framework
  flutter_lints: ^2.0.0            # Code quality and linting rules
  flutter_launcher_icons: "^0.14.4" # App icon generation

# ────────────────────────────────
# FLUTTER LAUNCHER ICONS CONFIG
# ────────────────────────────────
flutter_launcher_icons:
  ios: true                        # Generate iOS app icons
  image_path: "assets/images/app_icon.png"  # Source icon path
  remove_alpha_ios: true           # Remove alpha channel for iOS

# ────────────────────────────────
# FLUTTER CONFIGURATION
# ────────────────────────────────
flutter:
  uses-material-design: true       # Enable Material Design
  assets:
    - assets/images/               # Image assets directory

