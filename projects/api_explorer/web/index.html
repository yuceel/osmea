<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OSMEA API Explorer - Modern API testing platform with beautiful dark mode support">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta name="referrer" content="no-referrer-when-downgrade">

  <!-- Web app configuration -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OSMEA APIs">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#667eea">
  
  <!-- iOS meta tags & icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OSMEA API Explorer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Flutter web configuration -->
  <script>
    // Flutter web configuration to prevent white screen on refresh
    var serviceWorkerVersion = '{{flutter_service_worker_version}}';
    var scriptLoaded = false;
    
    function loadMainDartJs() {
      if (scriptLoaded) {
        return;
      }
      scriptLoaded = true;
      var scriptTag = document.createElement('script');
      scriptTag.src = 'main.dart.js';
      scriptTag.type = 'application/javascript';
      document.head.appendChild(scriptTag);
    }

    // Handle browser back/forward buttons
    window.addEventListener('popstate', function(event) {
      console.log('🔧 Browser navigation detected:', event.state);
    });

    // Handle page refresh
    window.addEventListener('beforeunload', function(event) {
      console.log('🔧 Page refresh detected, preserving state...');
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var serviceWorkerUrl = 'flutter_service_worker.js?v=' + serviceWorkerVersion;
        navigator.serviceWorker.register(serviceWorkerUrl)
          .then((reg) => {
            function waitForActivation(serviceWorker) {
              serviceWorker.addEventListener('statechange', () => {
                if (serviceWorker.state == 'activated') {
                  console.log('Installed new service worker.');
                  loadMainDartJs();
                }
              });
            }
            if (!reg.active && (reg.installing || reg.waiting)) {
              var serviceWorker = reg.installing || reg.waiting;
              waitForActivation(serviceWorker);
            } else if (!reg.active) {
              loadMainDartJs();
            }
          })
          .catch((error) => {
            console.warn('Service worker registration failed:', error);
            loadMainDartJs();
          });
      });
    } else {
      // Fallback for browsers that don't support service workers
      loadMainDartJs();
    }
  </script>

  <!-- Minimal styling to prevent white flash -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    
    /* Prevent white flash during loading */
    html {
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <!-- Flutter web bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
