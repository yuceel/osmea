name: api_explorer
description: "Modern API explorer application with wizard-based configuration system for Shopify and WooCommerce integrations. Features SQLite database storage and interactive setup wizard."

publish_to: 'none' 
version: 1.1.0+1

environment:
  sdk: ">=3.6.1 <4.0.0"

dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Core Package
  core:
    path: ../../packages/core
  
  # API Package
  apis:
    path: ../../packages/apis
  
  # Dependency Injection
  injectable: 2.5.0
  get_it: 7.7.0

  # Routing
  go_router: ^15.1.1

  # JSON Formatting
  flutter_highlight: ^0.7.0

  # URL Launcher
  url_launcher: ^6.2.4
  
  # Shared Preferences
  shared_preferences: ^2.5.3
  
  # Web Plugins (for usePathUrlStrategy)
  flutter_web_plugins:
    sdk: flutter
  

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
 
    
  # Linting
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: 2.4.13
  injectable_generator: 2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/































